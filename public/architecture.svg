<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="zg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#DC2626"/>
      <stop offset="1" stop-color="#B91C1C"/>
    </linearGradient>
    <linearGradient id="app" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748B"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#DC2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="820" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-size="28" font-weight="900" fill="#0F172A">ZeroViza Architecture</text>
  <text x="600" y="75" text-anchor="middle" font-size="14" fill="#64748B">AI immigration legal aid, fully decentralized on 0G</text>

  <!-- ── USER LAYER ─────────────────────────────────────────────────── -->
  <g transform="translate(430, 110)">
    <rect x="0" y="0" width="340" height="80" rx="16" fill="white" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)"/>
    <circle cx="45" cy="40" r="22" fill="#FEF2F2" stroke="#DC2626" stroke-width="2.5"/>
    <text x="45" y="46" text-anchor="middle" font-size="22">👤</text>
    <text x="85" y="35" font-size="16" font-weight="800" fill="#0F172A">User</text>
    <text x="85" y="55" font-size="12" fill="#64748B">Wallet-auth only • No password • No email</text>
    <text x="85" y="70" font-size="11" fill="#94A3B8">MetaMask · OKX · Phantom · Coinbase · 6 more</text>
  </g>

  <!-- Down arrow to app -->
  <line x1="600" y1="195" x2="600" y2="225" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── APP LAYER ──────────────────────────────────────────────────── -->
  <g transform="translate(170, 230)">
    <rect x="0" y="0" width="860" height="150" rx="18" fill="url(#app)" filter="url(#shadow)"/>
    <text x="430" y="32" text-anchor="middle" font-size="16" font-weight="800" fill="white">ZeroViza App · Next.js 15 · Server wallet pays gas (operator pattern)</text>

    <!-- API routes -->
    <g transform="translate(40, 55)">
      <rect x="0" y="0" width="170" height="75" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
      <text x="85" y="25" text-anchor="middle" font-size="13" font-weight="700" fill="#F8FAFC">/api/chat</text>
      <text x="85" y="44" text-anchor="middle" font-size="10" fill="#94A3B8">Immigration AI advisor</text>
      <text x="85" y="58" text-anchor="middle" font-size="10" fill="#94A3B8">30+ languages · 800 tokens</text>
    </g>
    <g transform="translate(225, 55)">
      <rect x="0" y="0" width="170" height="75" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
      <text x="85" y="25" text-anchor="middle" font-size="13" font-weight="700" fill="#F8FAFC">/api/upload</text>
      <text x="85" y="44" text-anchor="middle" font-size="10" fill="#94A3B8">Passport · ID · certificates</text>
      <text x="85" y="58" text-anchor="middle" font-size="10" fill="#94A3B8">PDF/JPG/PNG up to 25MB</text>
    </g>
    <g transform="translate(410, 55)">
      <rect x="0" y="0" width="170" height="75" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
      <text x="85" y="25" text-anchor="middle" font-size="13" font-weight="700" fill="#F8FAFC">/api/documents</text>
      <text x="85" y="44" text-anchor="middle" font-size="10" fill="#94A3B8">Vault management</text>
      <text x="85" y="58" text-anchor="middle" font-size="10" fill="#94A3B8">Content-addressed retrieval</text>
    </g>
    <g transform="translate(595, 55)">
      <rect x="0" y="0" width="170" height="75" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
      <text x="85" y="25" text-anchor="middle" font-size="13" font-weight="700" fill="#F8FAFC">/api/lawyers</text>
      <text x="85" y="44" text-anchor="middle" font-size="10" fill="#94A3B8">On-chain verified directory</text>
      <text x="85" y="58" text-anchor="middle" font-size="10" fill="#94A3B8">Apply · approve · reject</text>
    </g>
  </g>

  <!-- Three arrows down to 0G layer -->
  <line x1="340" y1="385" x2="340" y2="425" stroke="#DC2626" stroke-width="2.5" marker-end="url(#arrow-red)"/>
  <line x1="600" y1="385" x2="600" y2="425" stroke="#DC2626" stroke-width="2.5" marker-end="url(#arrow-red)"/>
  <line x1="860" y1="385" x2="860" y2="425" stroke="#DC2626" stroke-width="2.5" marker-end="url(#arrow-red)"/>

  <!-- ── 0G LAYER ───────────────────────────────────────────────────── -->
  <g transform="translate(170, 435)">
    <text x="430" y="-10" text-anchor="middle" font-size="13" font-weight="700" fill="#DC2626">Powered by 0G — three pillars, one product</text>

    <!-- 0G Compute -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="260" height="230" rx="16" fill="url(#zg)" filter="url(#shadow)"/>
      <text x="130" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="#FECACA">PILLAR 1</text>
      <text x="130" y="58" text-anchor="middle" font-size="22" font-weight="900" fill="white">0G Compute</text>

      <line x1="30" y1="75" x2="230" y2="75" stroke="#FECACA" stroke-opacity="0.4" stroke-width="1"/>

      <text x="30" y="100" font-size="12" font-weight="700" fill="white">What</text>
      <text x="30" y="118" font-size="11" fill="#FEE2E2">Decentralized AI inference</text>
      <text x="30" y="132" font-size="11" fill="#FEE2E2">GLM-5 / DeepSeek v3</text>

      <text x="30" y="158" font-size="12" font-weight="700" fill="white">Why</text>
      <text x="30" y="176" font-size="11" fill="#FEE2E2">Prompts never hit a</text>
      <text x="30" y="190" font-size="11" fill="#FEE2E2">centralized AI company.</text>
      <text x="30" y="204" font-size="11" fill="#FEE2E2">TEE sealed inference ready.</text>
      <text x="30" y="220" font-size="10" font-style="italic" fill="#FECACA">via @0glabs/0g-serving-broker</text>
    </g>

    <!-- 0G Storage -->
    <g transform="translate(300, 0)">
      <rect x="0" y="0" width="260" height="230" rx="16" fill="url(#zg)" filter="url(#shadow)"/>
      <text x="130" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="#FECACA">PILLAR 2</text>
      <text x="130" y="58" text-anchor="middle" font-size="22" font-weight="900" fill="white">0G Storage</text>

      <line x1="30" y1="75" x2="230" y2="75" stroke="#FECACA" stroke-opacity="0.4" stroke-width="1"/>

      <text x="30" y="100" font-size="12" font-weight="700" fill="white">What</text>
      <text x="30" y="118" font-size="11" fill="#FEE2E2">Documents, chat history,</text>
      <text x="30" y="132" font-size="11" fill="#FEE2E2">profiles, lawyer metadata</text>

      <text x="30" y="158" font-size="12" font-weight="700" fill="white">Why</text>
      <text x="30" y="176" font-size="11" fill="#FEE2E2">Content-addressed Merkle</text>
      <text x="30" y="190" font-size="11" fill="#FEE2E2">roots. Tamper-proof, can&apos;t</text>
      <text x="30" y="204" font-size="11" fill="#FEE2E2">be subpoenaed or deleted.</text>
      <text x="30" y="220" font-size="10" font-style="italic" fill="#FECACA">via @0glabs/0g-ts-sdk</text>
    </g>

    <!-- 0G Chain -->
    <g transform="translate(600, 0)">
      <rect x="0" y="0" width="260" height="230" rx="16" fill="url(#zg)" filter="url(#shadow)"/>
      <text x="130" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="#FECACA">PILLAR 3</text>
      <text x="130" y="58" text-anchor="middle" font-size="22" font-weight="900" fill="white">0G Chain</text>

      <line x1="30" y1="75" x2="230" y2="75" stroke="#FECACA" stroke-opacity="0.4" stroke-width="1"/>

      <text x="30" y="100" font-size="12" font-weight="700" fill="white">What</text>
      <text x="30" y="118" font-size="11" fill="#FEE2E2">2 Solidity contracts</text>
      <text x="30" y="132" font-size="11" fill="#FEE2E2">StorageIndex + LawyerRegistry</text>

      <text x="30" y="158" font-size="12" font-weight="700" fill="white">Why</text>
      <text x="30" y="176" font-size="11" fill="#FEE2E2">Mutable pointers to immutable</text>
      <text x="30" y="190" font-size="11" fill="#FEE2E2">0G data. 39 Foundry tests.</text>
      <text x="30" y="204" font-size="11" fill="#FEE2E2">Operator pattern — 0 user gas.</text>
      <text x="30" y="220" font-size="10" font-style="italic" fill="#FECACA">Aristotle Mainnet · Galileo Testnet</text>
    </g>
  </g>

  <!-- ── FOOTER ─────────────────────────────────────────────────────── -->
  <g transform="translate(170, 710)">
    <rect x="0" y="0" width="860" height="80" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="30" y="30" font-size="13" font-weight="800" fill="#0F172A">Why this architecture?</text>
    <text x="30" y="52" font-size="11" fill="#64748B">Sensitive immigration data (passports, asylum claims, family situations) cannot live on centralized servers that can be</text>
    <text x="30" y="68" font-size="11" fill="#64748B">subpoenaed, breached, or shut down. 0G makes ZeroViza censorship-resistant by design — and free for users to access.</text>
  </g>

  <!-- Footer badge -->
  <g transform="translate(1050, 775)">
    <text text-anchor="end" font-size="10" fill="#94A3B8">0G APAC Hackathon 2026 · Track 3: Agentic Economy</text>
  </g>
</svg>

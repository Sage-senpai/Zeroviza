[profile.default]
src      = "src"
out      = "out"
libs     = ["lib"]
test     = "test"
script   = "script"
optimizer        = true
optimizer_runs   = 200
via_ir           = false
solc_version     = "0.8.24"
# 0G Galileo requires legacy txs + min 2 gwei gas
legacy           = true
gas_price        = 3_000_000_000

[rpc_endpoints]
og_galileo = "https://evmrpc-testnet.0g.ai"

[etherscan]
og_galileo = { key = "placeholder", url = "https://chainscan-galileo.0g.ai/api" }
